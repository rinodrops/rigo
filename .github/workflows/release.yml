name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$CERT_P12_BASE64" | base64 -d > cert.p12
          security import cert.p12 -k build.keychain \
            -P "$CERT_PASSWORD" -T /usr/bin/codesign
          rm cert.p12
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
      - name: Build, sign, and notarize
        env:
          APPLE_DEVELOPER_CERTIFICATE_NAME: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_NAME }}
          APPLE_DEVELOPER_TEAM_ID: ${{ secrets.APPLE_DEVELOPER_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_DEVELOPER_APP_PASSWORD: ${{ secrets.APPLE_DEVELOPER_APP_PASSWORD }}
        run: just darwin-release
      - uses: actions/upload-artifact@v4
        with:
          name: darwin
          path: dist/*.zip

  linux-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
      - run: just linux-release win-release
      - uses: actions/upload-artifact@v4
        with:
          name: linux-windows
          path: |
            dist/*.zip
            dist/*.deb
            dist/*.rpm

  publish:
    needs: [darwin, linux-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
